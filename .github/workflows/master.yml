name: Node.js Workflow Bot

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Load database if exists
      uses: actions/download-artifact@v4
      with:
        name: database
        path: ./src
      continue-on-error: true  # First run: no artifact yet, that's fine

    - name: Install dependencies
      run: npm install
      working-directory: ./src

    - name: Run the bot
      run: node index.js
      env:
        DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      working-directory: ./src

    - name: Save database
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: database
        path: src/database.sqlite
        overwrite: true
